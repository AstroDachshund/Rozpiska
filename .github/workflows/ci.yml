name: CI

on:
  pull_request:
    # `labeled` pozwala odpalić job e2e po dodaniu etykiety `e2e` do istniejącego PR-a.
    types: [opened, synchronize, reopened, labeled]
  push:
    branches: [main]

jobs:
  build-and-test:
    # Nie odpalaj pełnego builda tylko z powodu zmiany etykiety (build już przeszedł
    # na opened/synchronize/push). Job e2e poniżej celowo reaguje na `labeled`.
    if: github.event.action != 'labeled'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: Build
        run: npm run build

      # ── Baza: migracje od zera + testy RLS ──────────────────────────────────
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase (applies migrations)
        run: supabase start

      - name: Reset DB from zero (dowód, że łańcuch migracji wstaje)
        run: supabase db reset

      - name: Export Supabase env for tests
        # `supabase status -o env` emituje wartości w cudzysłowach (KEY="value").
        # Dopisane wprost do $GITHUB_ENV cudzysłowy stałyby się częścią wartości
        # (process.env.SUPABASE_URL = '"http://..."' → "Invalid supabaseUrl").
        # Lokalnie dotenv zdejmuje cudzysłowy, w CI musimy zrobić to sami (sed).
        run: |
          supabase status -o env \
            --override-name api.url=SUPABASE_URL \
            --override-name auth.anon_key=SUPABASE_ANON_KEY \
            --override-name auth.service_role_key=SUPABASE_SERVICE_ROLE_KEY \
            | sed -E 's/^([A-Za-z_][A-Za-z0-9_]*)="(.*)"$/\1=\2/' \
            >> "$GITHUB_ENV"

      - name: RLS integration tests
        run: npm run test

  # ── E2E Playwright ─────────────────────────────────────────────────────────
  # Odpala się tylko na PR-ach z etykietą `e2e` oraz na push do main (przed releasem)
  # — zgodnie z CLAUDE.md. Reużywa tego samego setupu Supabase co build-and-test.
  e2e:
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'e2e')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser (chromium + deps)
        run: npx playwright install --with-deps chromium

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase (applies migrations)
        run: supabase start

      - name: Reset DB from zero
        run: supabase db reset

      - name: Export Supabase env
        # Ten sam wzorzec co w build-and-test: fixture'y E2E (e2e/helpers.ts) potrzebują
        # SERVICE_ROLE_KEY, a konfiguracja Playwrighta ładuje env z process.env.
        run: |
          supabase status -o env \
            --override-name api.url=SUPABASE_URL \
            --override-name auth.anon_key=SUPABASE_ANON_KEY \
            --override-name auth.service_role_key=SUPABASE_SERVICE_ROLE_KEY \
            | sed -E 's/^([A-Za-z_][A-Za-z0-9_]*)="(.*)"$/\1=\2/' \
            >> "$GITHUB_ENV"

      - name: Mirror public Supabase env for the Next app
        # webServer Playwrighta uruchamia `next dev`, który czyta NEXT_PUBLIC_*.
        # $SUPABASE_URL/$SUPABASE_ANON_KEY są już w env z poprzedniego kroku (GITHUB_ENV
        # działa dla kolejnych kroków).
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL=$SUPABASE_URL" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> "$GITHUB_ENV"

      - name: Playwright E2E
        # webServer (playwright.config.ts) sam startuje app na :3100; CI=true → nie reużywa.
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
